name: Rebuild gallery manifest

on:
  push:
    branches: [main]
    paths:
      - 'assets/gallary/**'
      - 'scripts/build-gallery.mjs'
      - '.github/workflows/gallery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild gallery manifest
        run: node scripts/build-gallery.mjs

      - name: Commit manifest if changed
        run: |
          if [[ -n "$(git status --porcelain assets/gallary/manifest.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/gallary/manifest.json
            git commit -m "chore(gallery): auto-rebuild manifest"
            git push
          else
            echo "Manifest already up to date."
          fi
